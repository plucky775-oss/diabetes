<main class="main-content">
  <section id="view-home" class="view active">
    <div class="hero-card status-card">
      <div class="hero-top"><span class="status-dot" id="statusDot"></span> <span id="statusLabel">분석 중</span></div>
      <div class="hero-number" id="metabolicScore">--</div>
      <div id="metabolicSummary" class="hero-sub">데이터를 입력하면 점수가 계산됩니다.</div>
    </div>
    <div class="card mission-card">
      <div class="section-title-row"><h3>오늘의 리셋 미션</h3><span class="pill" id="phasePill">Phase 1</span></div>
      <strong id="todayMissionTitle">--</strong>
      <p id="todayMissionText">--</p>
      <div class="mission-actions">
        <button id="missionCompleteBtn" class="primary-btn">완료</button>
        <button id="missionSkipBtn" class="secondary-btn">다음</button>
      </div>
    </div>
  </section>

  <section id="view-log" class="view">
    <div class="page-header card compact"><h2>오늘의 기록</h2></div>
    <div class="card">
      <h3>혈당 기록</h3>
      <form id="glucoseForm" class="form-grid">
        <input type="number" name="value" placeholder="혈당(mg/dL)" required />
        <select name="type"><option value="fasting">공복</option><option value="post1">식후 1h</option><option value="post2">식후 2h</option></select>
        <button type="submit" class="primary-btn">저장</button>
      </form>
    </div>
    </section>

  <section id="view-stats" class="view">
    <div class="card">
      <div class="section-title-row"><h3>혈당 도로망</h3></div>
      <div class="chart-card"><svg id="glucoseChart" viewBox="0 0 360 220"></svg></div>
    </div>
    <div class="card"><h3>위험 음식 랭킹</h3><div id="riskFoodList" class="list-stack"></div></div>
  </section>

  <section id="view-roadmap" class="view">
    <div class="card">
      <div class="section-title-row"><h3>12주 로드맵</h3><span class="pill" id="roadmapWeekPill">1주차</span></div>
      <input id="weekRange" type="range" min="1" max="12" />
      <div id="roadmapSummary" class="insight-card"></div>
    </div>
    <div class="card">
      <h3>정밀 진단 (HOMA-R)</h3>
      <div id="diagInsight" class="insight-card">최신 진단 데이터가 없습니다.</div>
    </div>
  </section>
</main>

<nav class="bottom-nav">
  <button class="nav-btn active" data-nav="home">홈</button>
  <button class="nav-btn" data-nav="log">기록</button>
  <button class="nav-btn" data-nav="stats">분석</button>
  <button class="nav-btn" data-nav="roadmap">로드맵</button>
</nav>
